{% extends "GRsystem/index.html" %}
{% block title %}Reset Link Sent — GRS{% endblock %}

{% block content %}
<div class="container" style="max-width:440px; padding-top:64px; padding-bottom:64px; text-align:center;">
    <div class="card p-5">
        <div style="font-size:2.2rem; margin-bottom:14px;">&#9993;</div>
        <h5 class="font-weight-bold mb-2" style="color:#1e2d3d;">Check your email</h5>
        <p class="text-muted" style="font-size:0.9rem;">
            If an account exists for that email address, a password reset link has been sent.
            Please check your inbox.
        </p>
        <a href="{% url 'signin' %}" class="btn btn-outline-primary btn-sm mt-3">Back to login</a>
    </div>
</div>
{% endblock %}
