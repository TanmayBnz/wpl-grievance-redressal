{% extends "GRsystem/index.html" %}
{% load crispy_forms_tags %}
{% block title %}Reset Password — GRS{% endblock %}

{% block content %}
<div class="container" style="max-width:420px; padding-top:56px; padding-bottom:60px;">
    <div class="card p-4">
        <h5 class="font-weight-bold mb-1" style="color:#1e2d3d;">Reset your password</h5>
        <p class="text-muted mb-4" style="font-size:0.85rem;">Enter your registered email address and we will send a password reset link.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary btn-block mt-2" type="submit">Send reset link</button>
        </form>
        <div class="mt-3" style="font-size:0.85rem;">
            <a href="{% url 'signin' %}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
