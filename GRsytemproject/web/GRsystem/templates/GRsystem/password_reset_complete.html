{% extends "GRsystem/index.html" %}
{% block title %}Password Reset Complete — GRS{% endblock %}

{% block content %}
<div class="container" style="max-width:420px; padding-top:64px; padding-bottom:64px; text-align:center;">
    <div class="card p-5">
        <div style="font-size:2rem; margin-bottom:14px;">&#10003;</div>
        <h5 class="font-weight-bold mb-2" style="color:#1e2d3d;">Password updated</h5>
        <p class="text-muted mb-4" style="font-size:0.9rem;">Your password has been set successfully. You can now log in with your new password.</p>
        <a href="{% url 'signin' %}" class="btn btn-primary btn-sm">Sign in</a>
    </div>
</div>
{% endblock %}
