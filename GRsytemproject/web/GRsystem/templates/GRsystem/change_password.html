{% extends "GRsystem/base_sidebar.html" %}
{% load crispy_forms_tags %}
{% block title %}Change Password — GRS{% endblock %}

{% block page_content %}
<div class="page-header">
    <h4>Change Password</h4>
    <p>Enter your current password, then choose a new one.</p>
</div>
<div class="row">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary mt-2">Update password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
